services:
  postgres:
    image: postgres:16
    container_name: trading_journal_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=trading_journal
    ports:
      - "5432:5432"
    volumes:
      - trading_journal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trading_journal_pgdata: